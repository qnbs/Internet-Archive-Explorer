name: Pages Smoke Checks

on:
  workflow_run:
    workflows: [Deploy to GitHub Pages]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-smoke
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke test live GitHub Pages URL
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Define app URL
        run: |
          echo "APP_URL=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
          echo "ORIGIN=https://${{ github.repository_owner }}.github.io" >> "$GITHUB_ENV"

      - name: Wait for Pages propagation
        run: |
          set -euo pipefail

          for attempt in {1..20}; do
            http_code=$(curl -sS --compressed -o /tmp/index.html -w '%{http_code}' -H 'Cache-Control: no-cache' "$APP_URL")

            if [[ "$http_code" == "200" ]] && grep -qi '<html' /tmp/index.html && grep -q 'assets/index-' /tmp/index.html; then
              echo "Pages is reachable with fresh content (attempt: $attempt)"
              break
            fi

            if [[ "$attempt" -eq 20 ]]; then
              echo "Pages did not serve fresh content in time (last code: $http_code)"
              exit 1
            fi

            sleep 15
          done

      - name: Validate critical endpoints
        run: |
          set -euo pipefail

          curl -fsSIL -H 'Cache-Control: no-cache' "${APP_URL}"
          curl -fsSIL -H 'Cache-Control: no-cache' "${APP_URL}sw.js"
          curl -fsSIL -H 'Cache-Control: no-cache' "${APP_URL}locales/en/common.json"
          curl -fsSIL -H 'Cache-Control: no-cache' "${APP_URL}locales/de/common.json"

      - name: Validate referenced assets from live HTML
        run: |
          set -euo pipefail

          js_path=$(grep -oE '(/[^" ]*assets/index-[^" ]+\.js|./assets/index-[^" ]+\.js)' /tmp/index.html | head -n 1 || true)
          manifest_path=$(grep -oE '(/[^" ]*assets/manifest-[^" ]+\.json|./assets/manifest-[^" ]+\.json)' /tmp/index.html | head -n 1 || true)

          if [[ -z "$js_path" ]]; then
            echo "Could not find main JS bundle path in live HTML"
            cat /tmp/index.html | head -20
            exit 1
          fi

          if [[ -z "$manifest_path" ]]; then
            echo "Could not find manifest path in live HTML"
            exit 1
          fi

          grep -q 'sw-register.js' /tmp/index.html

          if [[ "$js_path" == ./* ]]; then
            js_url="${APP_URL}${js_path#./}"
          else
            js_url="${ORIGIN}${js_path}"
          fi

          if [[ "$manifest_path" == ./* ]]; then
            manifest_url="${APP_URL}${manifest_path#./}"
          else
            manifest_url="${ORIGIN}${manifest_path}"
          fi

          curl -fsSIL -H 'Cache-Control: no-cache' "${js_url}"
          curl -fsSIL -H 'Cache-Control: no-cache' "${manifest_url}"

      - name: Basic a11y heuristics (no extra deps)
        run: |
          set -euo pipefail

          grep -qi '<html' /tmp/index.html
          grep -qi '<title>' /tmp/index.html
          grep -qi 'lang=' /tmp/index.html
          grep -qi 'name="viewport"' /tmp/index.html

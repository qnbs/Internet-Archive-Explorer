name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Prune old deployments
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP_DEPLOYMENTS: '3'
        run: |
          set -euo pipefail
          keep=${KEEP_DEPLOYMENTS:-3}
          echo "Fetching deployments for ${{ github.repository }}..."
          ids=$(gh api "repos/${{ github.repository }}/deployments" --paginate -q '.[].id' | sort -rn | tail -n +$((keep + 1)))

          count=$(echo "$ids" | grep -c '^' || true)
          if [ -z "$ids" ] || [ "$count" -eq 0 ]; then
            echo "No deployments to prune. Keeping $keep most recent."
            exit 0
          fi

          echo "Pruning $count deployment(s), keeping $keep most recent..."
          for id in $ids; do
            echo "Deleting deployment $id..."
            gh api --method DELETE "repos/${{ github.repository }}/deployments/$id"
          done

          echo "Pruning complete."

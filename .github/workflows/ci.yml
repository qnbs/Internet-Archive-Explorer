name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build and Artifact Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Security audit
        run: pnpm audit --audit-level=moderate

      - name: Biome CI (lint + format + assist checks)
        run: pnpm run lint:ci

      - name: Check locale key completeness
        run: pnpm run check:i18n

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Unit tests with coverage (Vitest)
        run: pnpm run test:unit:coverage

      - name: Upload unit test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Build (with bundle analysis)
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          ANALYZE: 'true'
        run: pnpm run build

      - name: Verify expected build artifacts
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/sw.js
          test -f dist/.nojekyll
          test -f dist/locales/en/common.json
          test -f dist/locales/de/common.json
          test -f dist/manifest.json
          test -f dist/icons/icon-192.png
          test -f dist/icons/icon-512.png
          grep -q 'icons/icon-192.png' dist/manifest.json
          grep -q 'screenshots/' dist/manifest.json

      - name: Verify GitHub Pages base paths in HTML
        run: |
          set -euo pipefail
          BASE_PATH="/${{ github.event.repository.name }}/"
          grep -q "${BASE_PATH}assets/" dist/index.html
          grep -q 'sw-register.js' dist/index.html

      - name: Check bundle size budgets
        run: pnpm run check:bundle-size

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7

      - name: Lighthouse CI (desktop / a11y gates)
        run: |
          REPO="${{ github.event.repository.name }}"
          sed "s/Internet-Archive-Explorer/${REPO}/g" lighthouserc.json > lighthouserc.run.json
          npx --yes @lhci/cli@0.14.0 autorun --config=./lighthouserc.run.json

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload bundle analysis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: dist/bundle-report.json
          retention-days: 14
          if-no-files-found: ignore

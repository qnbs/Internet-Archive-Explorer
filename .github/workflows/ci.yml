name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and Artifact Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Check locale key completeness
        run: node scripts/sync-locales.mjs --check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build (with bundle analysis)
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          ANALYZE: 'true'
        run: npm run build

      - name: Verify expected build artifacts
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/sw.js
          test -f dist/.nojekyll
          test -f dist/locales/en/common.json
          test -f dist/locales/de/common.json

      - name: Verify GitHub Pages base paths in HTML
        run: |
          set -euo pipefail
          BASE_PATH="/${{ github.event.repository.name }}/"
          grep -q "${BASE_PATH}assets/" dist/index.html
          grep -q 'sw-register.js' dist/index.html

      - name: Check bundle size budgets
        run: node scripts/check-bundle-size.mjs

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run test:e2e

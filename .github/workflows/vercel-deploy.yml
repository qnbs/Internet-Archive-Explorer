name: Vercel Deploy (optional)

# Optional mirror deploy when VERCEL_* repository secrets are set.
# Vercel Git integration (dashboard) works independently — see docs/DEPLOYMENT.md.
# GitHub Actions forbids `secrets` in job/step `if:` — we gate via step output instead.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Detect Vercel secrets
        id: vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "${VERCEL_TOKEN:-}" ] && [ -n "${VERCEL_ORG_ID:-}" ] && [ -n "${VERCEL_PROJECT_ID:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Vercel secrets not configured — skipping optional Actions deploy."
            echo "See docs/DEPLOYMENT.md (Vercel dashboard Git integration still works)."
          fi

      - name: Checkout
        if: steps.vercel.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        if: steps.vercel.outputs.enabled == 'true'
        with:
          version: 10.6.1

      - name: Setup Node.js
        if: steps.vercel.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        if: steps.vercel.outputs.enabled == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        if: steps.vercel.outputs.enabled == 'true'
        run: pnpm add -g vercel@latest

      - name: Pull Vercel Environment
        if: steps.vercel.outputs.enabled == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel pull --yes \
            --environment=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'production' || 'preview' }} \
            --token="$VERCEL_TOKEN"

      - name: Build for Vercel (root base path)
        if: steps.vercel.outputs.enabled == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_BASE_PATH: /
        run: |
          vercel build \
            ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && '--prod' || '' }} \
            --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        if: steps.vercel.outputs.enabled == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          url=$(vercel deploy --prebuilt \
            ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && '--prod' || '' }} \
            --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed: $url"

      - name: Smoke check deployment URL
        if: steps.deploy.outputs.url != ''
        run: |
          set -euo pipefail
          url="${{ steps.deploy.outputs.url }}"
          curl -fsSIL "${url}"
          curl -fsSIL "${url}manifest.json"
          curl -fsSIL "${url}sw.js"

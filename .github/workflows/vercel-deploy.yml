name: Vercel Deploy

# Deploys the app to Vercel on every push to main (production) and on pull
# requests (preview). Requires VERCEL_TOKEN, VERCEL_ORG_ID and VERCEL_PROJECT_ID
# repository secrets. Vercel dashboard Git integration can be disabled when this
# workflow is used. See docs/DEPLOYMENT.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel Environment
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel pull --yes \
            --environment=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'production' || 'preview' }} \
            --token="$VERCEL_TOKEN"

      - name: Build for Vercel (root base path)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_BASE_PATH: /
        run: |
          vercel build \
            ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && '--prod' || '' }} \
            --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          url=$(vercel deploy --prebuilt \
            ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && '--prod' || '' }} \
            --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed: $url"

      - name: Smoke check deployment URL
        run: |
          set -euo pipefail
          url="${{ steps.deploy.outputs.url }}"
          curl -fsSIL "${url}"
          curl -fsSIL "${url}manifest.json"
          curl -fsSIL "${url}sw.js"

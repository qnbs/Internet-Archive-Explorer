version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:00"
      day: "monday"
    open-pull-requests-limit: 5
    allow:
      - dependency-type: "direct:production"
      - dependency-type: "direct:development"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    versioning-strategy: "auto"
